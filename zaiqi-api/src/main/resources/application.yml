server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: zaiqi-api
  profiles:
    active: dev
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
  data:
    redis:
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: zaiqi-files

deepseek:
  api-key: ${DEEPSEEK_API_KEY:sk-mock-key}
  api-url: https://api.deepseek.com/v1/chat/completions
  model: deepseek-chat

mybatis-plus:
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

jwt:
  secret: zaiqi-jwt-secret-key-must-be-at-least-256-bits-long-for-hmac-sha
  access-token-expiration: 86400000
  refresh-token-expiration: 2592000000

wx:
  pay:
    app-id: ${WX_APP_ID:wx-mock-appid}
    mch-id: ${WX_MCH_ID:1234567890}
    api-v3-key: ${WX_API_V3_KEY:mock-v3-key-must-be-32-chars-long}
    private-key-path: ${WX_PRIVATE_KEY_PATH:/data/certs/apiclient_key.pem}
    serial-no: ${WX_SERIAL_NO:mock-serial-no}
    notify-url: https://api.zaiqi.com/api/pay/notify
    refund-notify-url: https://api.zaiqi.com/api/pay/refund-notify
